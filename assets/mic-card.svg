<svg xmlns="http://www.w3.org/2000/svg" width="340" height="200" viewBox="0 0 340 200">
<style>
@keyframes fadeIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
@keyframes pulse { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
.icon { animation: fadeIn 800ms ease-out, pulse 3s ease-in-out 800ms infinite; transform-origin: center; transform-box: fill-box; }
</style>
<rect x="0.5" y="0.5" rx="4.5" ry="4.5" width="339" height="199" stroke="#e63946" stroke-width="1" fill="#1a1d24" stroke-opacity="1"/>
<image class="icon" x="100" y="30" width="140" height="140" href="data:image/png;base64,"/>
</svg>
