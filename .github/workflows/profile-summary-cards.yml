name: GitHub Profile Summary Cards

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate cards
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: kakeru-ikeda/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 9
